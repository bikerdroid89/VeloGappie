name: Bug Report
description: Report a problem with VeloGappie
labels: ["bug"]
body:
  - type: input
    id: bike-model
    attributes:
      label: Bike model
      description: Which Veloretti bike do you have?
      placeholder: e.g. Ivy 2 Pro
    validations:
      required: true
  - type: input
    id: phone
    attributes:
      label: Phone model and Android version
      placeholder: e.g. Pixel 8 Pro, Android 15
    validations:
      required: true
  - type: input
    id: app-version
    attributes:
      label: VeloGappie version
      placeholder: e.g. v0.3.0
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the problem?
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: false
